[settings]
env_shell_expand = true

[env]
HCLOUD_TOKEN = "{{ get_env(name='HCLOUD_TOKEN', default=exec(command='pass infrastructure/pelle.io/cloud_api_token')) }}"
GITHUB_TOKEN = "{{ get_env(name='GITHUB_TOKEN', default=exec(command='pass github/pellepelster/pat/admin')) }}"

[tools]
terraform="1.14.5"

[tasks.apply]
run = "blcks cloud apply pelle.yaml"

[tasks.plan]
run = "blcks cloud plan pelle.yaml"

[tasks.help]
run = "blcks cloud help pelle.yaml"

[tasks.info]
run = "blcks cloud info pelle.yaml"
